<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astryx v0.1.2 â€” CDN Test</title>
  <meta name="description" content="Testing Astryx v0.1.2 UMD bundle from CDN with React 19 and StyleX â€” no bundler required.">

  <!-- Astryx CSS from CDN (3 imports: reset â†’ astryx-base â†’ theme) -->
  <link rel="stylesheet" href="https://unpkg.com/@astryxdesign/core@0.1.2/src/reset.css">
  <link rel="stylesheet" href="https://unpkg.com/@astryxdesign/core@0.1.2/dist/astryx.css">
  <link rel="stylesheet" href="https://unpkg.com/@astryxdesign/theme-neutral@0.1.2/dist/theme.css">

  <!-- Import map: React 19 from esm.sh (React 19 dropped UMD builds) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.2.7",
      "react-dom/client": "https://esm.sh/react-dom@19.2.7/client",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>

  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
    }
    /* Loading state */
    .cdn-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--color-text-secondary, #4E606F);
      flex-direction: column;
      gap: 12px;
    }
    .cdn-loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cdn-error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, sans-serif;
      color: #E3193B;
      flex-direction: column;
      gap: 8px;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="cdn-loading">
      <div class="spinner"></div>
      <div>Loading Astryx from CDNâ€¦</div>
    </div>
  </div>

  <script type="module">
    // â”€â”€â”€ Boot sequence â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // 1. Import React 19 from esm.sh (React 19 has no UMD builds)
    // 2. Set window.React / window.ReactDOM globals
    // 3. Dynamically load the Astryx UMD bundle (expects global React)
    // 4. Import the pre-built neutral theme
    // 5. Render the app

    const root = document.getElementById('root');

    try {
      // Step 1: React 19 from esm.sh
      const React = (await import('react')).default;
      const { createRoot } = await import('react-dom/client');
      const htm = (await import('htm')).default;

      // Step 2: Set globals for the Astryx UMD bundle
      window.React = React;
      window.ReactDOM = { createRoot };

      // htm gives us JSX-like syntax without a bundler
      const h = htm.bind(React.createElement);

      // Step 3: Load Astryx UMD bundle dynamically
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/@astryxdesign/core@0.1.2/dist/astryx.umd.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load Astryx UMD bundle from CDN'));
        document.head.appendChild(script);
      });

      // The UMD bundle exposes everything on window.Astryx
      const A = window.Astryx;
      const {
        Theme, defineTheme,
        AppShell, TopNav, TopNavHeading, TopNavItem,
        SideNav, SideNavSection, SideNavItem,
        Button, IconButton, ButtonGroup,
        Text, Heading, Link,
        VStack, HStack, Stack,
        Card, Section, Divider, Badge, Banner,
        Switch, TextInput, TextArea, Selector,
        SegmentedControl, SegmentedControlItem,
        Grid, EmptyState, ProgressBar, StatusDot,
        Spinner, Kbd, Tooltip, Avatar,
        MediaTheme,
      } = A;

      // Step 4: Import the pre-built neutral theme from esm.sh
      const { neutralTheme } = await import('https://esm.sh/@astryxdesign/theme-neutral@0.1.2/built');

      // â”€â”€â”€ App â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      const { useState, useEffect, useMemo } = React;

      function App() {
        const [mode, setMode] = useState('light');
        const [notifications, setNotifications] = useState(true);
        const [compactView, setCompactView] = useState(false);
        const [name, setName] = useState('');
        const [feedback, setFeedback] = useState('');
        const [layout, setLayout] = useState('grid');
        const [progress, setProgress] = useState(65);
        const [activePage, setActivePage] = useState('overview');

        // Animate progress bar
        useEffect(() => {
          if (!notifications) return;
          const interval = setInterval(() => {
            setProgress(p => {
              const next = p + Math.random() * 10 - 5;
              return Math.max(10, Math.min(95, next));
            });
          }, 2000);
          return () => clearInterval(interval);
        }, [notifications]);

        const pages = {
          overview: h`<${OverviewPage} mode=${mode} progress=${progress} notifications=${notifications} />`,
          components: h`<${ComponentsPage} />`,
          forms: h`<${FormsPage} name=${name} setName=${setName} feedback=${feedback} setFeedback=${setFeedback} />`,
          settings: h`<${SettingsPage}
            mode=${mode} setMode=${setMode}
            notifications=${notifications} setNotifications=${setNotifications}
            compactView=${compactView} setCompactView=${setCompactView}
            layout=${layout} setLayout=${setLayout}
          />`,
        };

        return h`
          <${Theme} theme=${neutralTheme} mode=${mode}>
            <${AppShell}
              topNav=${h`
                <${TopNav}
                  heading=${h`<${TopNavHeading} heading="Astryx CDN" />`}
                  endContent=${h`
                    <${HStack} gap=${2} vAlign="center">
                      <${Button}
                        label=${mode === 'dark' ? 'â˜€ï¸Ž Light' : 'â˜¾ Dark'}
                        variant="ghost"
                        size="sm"
                        onClick=${() => setMode(m => m === 'dark' ? 'light' : 'dark')}
                      />
                      <${Badge} variant="info" label="v0.1.2" />
                      <${Avatar}
                        name="Cindy"
                        size="small"
                        src="https://avatars.githubusercontent.com/u/10214025?v=4"
                      />
                    <//>
                  `}
                />
              `}
              sideNav=${h`
                <${SideNav}>
                  <${SideNavSection} title="Explore">
                    <${SideNavItem}
                      label="Overview"
                      isSelected=${activePage === 'overview'}
                      onClick=${() => setActivePage('overview')}
                    />
                    <${SideNavItem}
                      label="Components"
                      isSelected=${activePage === 'components'}
                      onClick=${() => setActivePage('components')}
                    />
                    <${SideNavItem}
                      label="Forms"
                      isSelected=${activePage === 'forms'}
                      onClick=${() => setActivePage('forms')}
                    />
                  <//>
                  <${SideNavSection} title="System">
                    <${SideNavItem}
                      label="Settings"
                      isSelected=${activePage === 'settings'}
                      onClick=${() => setActivePage('settings')}
                    />
                  <//>
                <//>
              `}
              contentPadding=${6}
              height="fill"
              variant="section"
            >
              ${pages[activePage]}
            <//>
          <//>
        `;
      }

      // â”€â”€â”€ Overview Page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      function OverviewPage({ mode, progress, notifications }) {
        return h`
          <${VStack} gap=${6}>
            <${VStack} gap=${2}>
              <${Heading} level=${1}>Astryx v0.1.2 â€” CDN Test<//>
              <${Text} type="supporting" size="lg">
                This entire page loads from CDN with no bundler. React 19 from esm.sh,
                Astryx UMD from unpkg, StyleX runtime bundled in.
              <//>
            <//>

            <${Banner}
              status="info"
              title="UMD Bundle Active"
              description="The global window.Astryx exposes 240 exports including all components, defineTheme, and theme utilities."
            />

            <${Grid} columns=${{ minWidth: 280 }} gap=${4}>
              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${HStack} gap=${2} vAlign="center">
                    <${StatusDot} variant="success" />
                    <${Heading} level=${3}>CDN Status<//>
                  <//>
                  <${VStack} gap=${1}>
                    <${Text} type="body">React 19.2.7 â€” esm.sh<//>
                    <${Text} type="body">Astryx 0.1.2 â€” unpkg UMD<//>
                    <${Text} type="body">StyleX runtime â€” bundled<//>
                    <${Text} type="body">Theme: neutral â€” esm.sh<//>
                  <//>
                  <${HStack} gap=${2}>
                    <${Badge} variant="success" label="Loaded" />
                    <${Badge} variant="info" label=${mode} />
                  <//>
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Live Progress<//>
                  <${Text} type="supporting">
                    ${notifications ? 'Animated progress bar using React hooks' : 'Enable notifications in Settings'}
                  <//>
                  <${ProgressBar}
                    label="CDN sync"
                    value=${Math.round(progress)}
                    variant="accent"
                    hasValueLabel
                  />
                  <${HStack} gap=${2}>
                    <${Kbd} keys="Cmd+K" />
                    <${Text} type="supporting">to search<//>
                  <//>
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Button Variants<//>
                  <${VStack} gap=${2}>
                    <${HStack} gap=${2}>
                      <${Button} label="Primary" variant="primary" size="sm" />
                      <${Button} label="Secondary" variant="secondary" size="sm" />
                      <${Button} label="Ghost" variant="ghost" size="sm" />
                    <//>
                    <${HStack} gap=${2}>
                      <${Button} label="Primary" variant="primary" size="md" />
                      <${Button} label="Secondary" variant="secondary" size="md" />
                    <//>
                    <${HStack} gap=${2}>
                      <${Button} label="Primary" variant="primary" size="lg" />
                      <${Button} label="Ghost" variant="ghost" size="lg" />
                    <//>
                  <//>
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Badges & Status<//>
                  <${HStack} gap=${2} wrap="wrap">
                    <${Badge} variant="info" label="accent" />
                    <${Badge} variant="success" label="success" />
                    <${Badge} variant="warning" label="warning" />
                    <${Badge} variant="error" label="error" />
                    <${Badge} variant="neutral" label="neutral" />
                  <//>
                  <${Divider} />
                  <${HStack} gap=${3} vAlign="center">
                    <${StatusDot} variant="success" label="Healthy" />
                    <${StatusDot} variant="warning" label="Degraded" />
                    <${StatusDot} variant="error" label="Down" />
                    <${StatusDot} variant="accent" label="Active" />
                  <//>
                <//>
              <//>
            <//>

            <${Card} padding=${5}>
              <${VStack} gap=${3}>
                <${Heading} level=${3}>What's New in v0.1.2<//>
                <${VStack} gap=${2}>
                  <${HStack} gap=${2} vAlign="start">
                    <${Badge} variant="success" label="New" />
                    <${Text} type="body">
                      Prebuilt UMD bundle (<${Link} href="https://unpkg.com/@astryxdesign/core@0.1.2/dist/astryx.umd.js" target="_blank">dist/astryx.umd.js<//>) â€” global <${Kbd} keys="Astryx" />, no bundler needed
                    <//>
                  <//>
                  <${HStack} gap=${2} vAlign="start">
                    <${Badge} variant="success" label="New" />
                    <${Text} type="body">Button <${Kbd} keys="isInterruptible" /> prop â€” keep clickable during async clickAction<//>
                  <//>
                  <${HStack} gap=${2} vAlign="start">
                    <${Badge} variant="success" label="New" />
                    <${Text} type="body"><${Kbd} keys="useTableStickyColumns" /> â€” pin table columns with scroll-aware shadows<//>
                  <//>
                  <${HStack} gap=${2} vAlign="start">
                    <${Badge} variant="warning" label="Breaking" />
                    <${Text} type="body"><${Kbd} keys="color=active" /> renamed to <${Kbd} keys="color=accent" /> on Text, Heading, Link, Timestamp<//>
                  <//>
                <//>
              <//>
            <//>
          <//>
        `;
      }

      // â”€â”€â”€ Components Page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      function ComponentsPage() {
        return h`
          <${VStack} gap=${6}>
            <${Heading} level=${1}>Component Showcase<//>
            <${Text} type="supporting" size="lg">
              All components rendered from the UMD global â€” no bundler, no StyleX plugin.
            <//>

            <${Grid} columns=${{ minWidth: 300 }} gap=${4}>
              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Switch<//>
                  <${Switch} label="Enable feature A" value=${true} onChange=${() => {}} />
                  <${Switch} label="Enable feature B" value=${false} onChange=${() => {}} />
                  <${Switch} label="Hidden label switch" value=${true} isLabelHidden onChange=${() => {}} />
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Segmented Control<//>
                  <${SegmentedControl}
                    label="View mode"
                    value="grid"
                    onChange=${() => {}}
                  >
                    <${SegmentedControlItem} value="grid" label="Grid" />
                    <${SegmentedControlItem} value="list" label="List" />
                    <${SegmentedControlItem} value="table" label="Table" />
                  <//>
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Empty State<//>
                  <${EmptyState}
                    title="No results"
                    description="Try adjusting your search or filters to find what you need."
                  />
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Avatar<//>
                  <${HStack} gap=${2} vAlign="center">
                    <${Avatar} name="Cindy" size="small" src="https://avatars.githubusercontent.com/u/10214025?v=4" />
                    <${Avatar} name="Benji" size="medium" />
                    <${Avatar} name="Ruby" size="large" />
                  <//>
                  <${Divider} />
                  <${HStack} gap=${2}>
                    <${Spinner} size="sm" />
                    <${Spinner} size="md" />
                    <${Spinner} size="lg" />
                  <//>
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Banner Variants<//>
                  <${Banner} status="success" title="Success" description="Operation completed." />
                  <${Banner} status="warning" title="Warning" description="Proceed with caution." />
                  <${Banner} status="error" title="Error" description="Something went wrong." />
                <//>
              <//>

              <${Card} padding=${5}>
                <${VStack} gap=${3}>
                  <${Heading} level=${3}>Progress Bars<//>
                  <${ProgressBar} label="Upload" value=${75} variant="accent" hasValueLabel />
                  <${ProgressBar} label="Processing" value=${40} variant="success" hasValueLabel />
                  <${ProgressBar} label="Warning task" value=${90} variant="warning" hasValueLabel />
                  <${ProgressBar} label="Failed task" value=${30} variant="error" hasValueLabel />
                  <${ProgressBar} label="Indeterminate" isIndeterminate variant="accent" />
                <//>
              <//>
            <//>
          <//>
        `;
      }

      // â”€â”€â”€ Forms Page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      function FormsPage({ name, setName, feedback, setFeedback }) {
        return h`
          <${VStack} gap=${6}>
            <${Heading} level=${1}>Form Components<//>
            <${Text} type="supporting" size="lg">
              Interactive form controls powered by React hooks from the UMD bundle.
            <//>

            <${Card} padding=${6}>
              <${VStack} gap=${4}>
                <${Heading} level=${2}>Contact Form<//>
                <${TextInput}
                  label="Name"
                  value=${name}
                  onChange=${(e) => setName(e.target.value)}
                  placeholder="Enter your name"
                />
                <${TextArea}
                  label="Feedback"
                  value=${feedback}
                  onChange=${(e) => setFeedback(e.target.value)}
                  placeholder="Share your thoughts on the CDN experienceâ€¦"
                  rows=${4}
                />
                <${HStack} gap=${3}>
                  <${Button}
                    label="Submit"
                    variant="primary"
                    onClick=${() => alert(`Name: ${name}\nFeedback: ${feedback}`)}
                  />
                  <${Button}
                    label="Clear"
                    variant="ghost"
                    onClick=${() => { setName(''); setFeedback(''); }}
                  />
                <//>
                ${name ? h`<${Text} type="supporting">Hello, ${name}!<//>` : ''}
              <//>
            <//>

            <${Card} padding=${6}>
              <${VStack} gap=${4}>
                <${Heading} level=${2}>Selector<//>
                <${Selector}
                  label="Choose a theme"
                  value="neutral"
                  onChange=${() => {}}
                  options=${[
                    { value: 'neutral', label: 'Neutral' },
                    { value: 'stone', label: 'Stone' },
                    { value: 'matcha', label: 'Matcha' },
                    { value: 'butter', label: 'Butter' },
                  ]}
                />
              <//>
            <//>
          <//>
        `;
      }

      // â”€â”€â”€ Settings Page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      function SettingsPage({ mode, setMode, notifications, setNotifications, compactView, setCompactView, layout, setLayout }) {
        return h`
          <${VStack} gap=${6}>
            <${Heading} level=${1}>Settings<//>
            <${Text} type="supporting" size="lg">
              Runtime theme switching and feature toggles â€” all from CDN.
            <//>

            <${Section} padding=${6}>
              <${VStack} gap=${5}>
                <${Heading} level=${2}>Appearance<//>
                <${HStack} gap=${4} vAlign="center">
                  <${VStack} gap=${1} style=${{ flex: 1 }}>
                    <${Text} type="label">Color mode<//>
                    <${Text} type="supporting">Toggle between light and dark themes<//>
                  <//>
                  <${SegmentedControl}
                    label="Color mode"
                    value=${mode}
                    onChange=${(v) => setMode(v)}
                  >
                    <${SegmentedControlItem} value="light" label="Light" />
                    <${SegmentedControlItem} value="dark" label="Dark" />
                  <//>
                <//>

                <${Divider} />

                <${HStack} gap=${4} vAlign="center">
                  <${VStack} gap=${1} style=${{ flex: 1 }}>
                    <${Text} type="label">Layout view<//>
                    <${Text} type="supporting">How content cards are displayed<//>
                  <//>
                  <${SegmentedControl}
                    label="Layout view"
                    value=${layout}
                    onChange=${(v) => setLayout(v)}
                  >
                    <${SegmentedControlItem} value="grid" label="Grid" />
                    <${SegmentedControlItem} value="list" label="List" />
                    <${SegmentedControlItem} value="compact" label="Compact" />
                  <//>
                <//>
              <//>
            <//>

            <${Section} padding=${6}>
              <${VStack} gap=${5}>
                <${Heading} level=${2}>Notifications<//>
                <${HStack} gap=${4} vAlign="center">
                  <${VStack} gap=${1} style=${{ flex: 1 }}>
                    <${Text} type="label">Push notifications<//>
                    <${Text} type="supporting">Animate the progress bar on the overview page<//>
                  <//>
                  <${Switch}
                    label="Push notifications"
                    value=${notifications}
                    onChange=${() => setNotifications(n => !n)}
                  />
                <//>

                <${Divider} />

                <${HStack} gap=${4} vAlign="center">
                  <${VStack} gap=${1} style=${{ flex: 1 }}>
                    <${Text} type="label">Compact view<//>
                    <${Text} type="supporting">Reduce padding and spacing<//>
                  <//>
                  <${Switch}
                    label="Compact view"
                    value=${compactView}
                    onChange=${() => setCompactView(c => !c)}
                  />
                <//>
              <//>
            <//>

            <${Section} padding=${6}>
              <${VStack} gap=${4}>
                <${Heading} level=${2}>About<//>
                <${VStack} gap=${2}>
                  <${HStack} gap=${2} vAlign="center">
                    <${Text} type="label">Astryx:<//>
                    <${Badge} variant="info" label="0.1.2" />
                    <${Link} href="https://github.com/facebook/astryx/releases/tag/v0.1.2" target="_blank">Release notes<//>
                  <//>
                  <${HStack} gap=${2} vAlign="center">
                    <${Text} type="label">React:<//>
                    <${Badge} variant="neutral" label="19.2.7" />
                    <${Link} href="https://esm.sh/react@19.2.7" target="_blank">esm.sh<//>
                  <//>
                  <${HStack} gap=${2} vAlign="center">
                    <${Text} type="label">UMD bundle:<//>
                    <${Link} href="https://unpkg.com/@astryxdesign/core@0.1.2/dist/astryx.umd.js" target="_blank">unpkg<//>
                    <${Text} type="supporting">(${(594).toFixed(0)}KB, global: Astryx)<//>
                  <//>
                  <${HStack} gap=${2} vAlign="center">
                    <${Text} type="label">StyleX:<//>
                    <${Text} type="supporting">bundled in UMD<//>
                  <//>
                <//>
              <//>
            <//>
          <//>
        `;
      }

      // â”€â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      createRoot(root).render(h`<${App} />`);

    } catch (err) {
      console.error('CDN boot failed:', err);
      root.innerHTML = `
        <div class="cdn-error">
          <div style="font-size: 1.5rem; font-weight: 600;">Failed to load</div>
          <div style="font-size: 0.875rem;">${err.message}</div>
          <div style="font-size: 0.75rem; margin-top: 8px; color: #999;">Check your network connection and CDN availability</div>
        </div>
      `;
    }
  </script>
</body>
</html>
